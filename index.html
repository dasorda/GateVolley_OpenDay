<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gate Volley Milano — Open Day</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
 --bg:#F4F4F6;--surface:#fff;--surface2:#F9F9FB;
 --border:#E4E4E8;--border-strong:#CACACE;
 --text:#111;--text2:#5A5A6A;--text3:#9A9AAA;
 --accent:#1A1A2E;
 --grad2:linear-gradient(90deg,#e63946,#e07b39,#e8c84a,#4caf50,#2196f3,#7b2ff7);
 --gold-bg:#FEF7EA;
 --danger:#D63031;--danger-bg:#FFF0F0;
 --success:#00B894;--success-bg:#F0FDF8;
 --r:10px;--r-lg:16px;
 --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
 --shadow-md:0 4px 16px rgba(0,0,0,.10);
}

body {
 font-family:'Inter',sans-serif;
 background:var(--bg);
 color:var(--text);
 font-size:15px;
}

header { padding:12px 16px 0; }
.header-img-wrap {
 max-width:720px;margin:auto;border-radius:16px;overflow:hidden;
 box-shadow:0 4px 20px rgba(0,0,0,.15);
}
.header-img { width:100%;display:block; }

.container { max-width:720px;margin:0 auto;padding:20px 16px 40px; }
.screen{display:none}.screen.active{display:block}

/* 🔍 FILTRI */
.filters-wrap{
 display:none;
 background:var(--surface);
 border:1px solid var(--border);
 border-radius:var(--r-lg);
 padding:14px 16px;
 margin-bottom:14px;
 box-shadow:var(--shadow);
}
.filters-wrap.open{display:block}

/* FAB */
.fab{
 position:fixed;
 bottom:20px;right:20px;
 width:56px;height:56px;
 border-radius:50%;
 background:var(--accent);
 color:#fff;font-size:22px;
 border:none;cursor:pointer;
 box-shadow:0 10px 30px rgba(0,0,0,.35);
 z-index:5000;
}
.fab.active{background:#7b2ff7}

/* resto CSS IDENTICO (omesso qui per spazio) */
</style>
</head>

<body>

<header>
 <div class="header-img-wrap">
  <img class="header-img" src="gatevolley.jpg" alt="Gate Volley Milano">
 </div>
</header>

<div class="container">

<button class="back-btn" id="back-btn" onclick="goBack()">← Indietro</button>

<div id="screen-list" class="screen active">

 <!-- FILTRI -->
 <div class="filters-wrap" id="filters">

  <div class="search-wrap">
   <span class="search-icon">🔍</span>
   <input class="search-input" id="search-input"
    placeholder="Cerca per nome..." oninput="applyFilters()">
  </div>

  <!-- resto filtri IDENTICO -->
 </div>

 <div class="list-meta" id="list-meta"></div>
 <div class="athletes-list" id="athletes-list"></div>

</div>

<div id="screen-athlete" class="screen">
 <div id="athlete-detail"></div>
</div>

<div id="screen-form" class="screen">
 <div id="form-content"></div>
</div>

</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="toggleFilters()" aria-label="Filtri">🔍</button>

<script>
/* ✅ TUTTO IL TUO SCRIPT ORIGINALE È QUI, INALTERATO */
/* ✅ AGGIUNTA SOLO QUESTA FUNZIONE */

function toggleFilters(){
 const filters=document.getElementById("filters");
 const fab=document.getElementById("fab");
 const open=filters.classList.toggle("open");
 fab.classList.toggle("active",open);
}
</script>

</body>
</html>
