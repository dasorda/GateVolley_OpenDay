<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gate Volley Milano — Open Day</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F4F4F6;
  --surface: #FFFFFF;
  --surface2: #F9F9FB;
  --border: #E4E4E8;
  --border-strong: #CACACE;
  --text: #111116;
  --text2: #5A5A6A;
  --text3: #9A9AAA;
  --accent: #1A1A2E;
  --grad2: linear-gradient(90deg, #e63946, #e07b39, #e8c84a, #4caf50, #2196f3, #7b2ff7);
  --gold-bg: #FEF7EA;
  --danger: #D63031;
  --success: #00B894;
  --r: 10px;
  --r-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
}

/* HEADER */
header {
  background: var(--bg);
  padding: 12px 16px 0;
}

.header-img-wrap {
  max-width: 720px;
  margin: 0 auto;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.header-img {
  width: 100%;
  height: auto;
  display: block;
}

/* CONTAINER */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* BACK */
.back-btn {
  display: none;
  margin-bottom: 14px;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: white;
}

/* FILTERS */
.filters-toggle-wrap {
  margin-bottom: 10px;
}

.main-filter-btn,
.more-filters-btn {
  width: 100%;
  padding: 11px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow);
}

.more-filters-btn {
  margin: 10px 0;
  background: var(--surface2);
}

.filters-wrap {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 14px;
  box-shadow: var(--shadow);
}

.search-wrap {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
}

.search-input {
  width: 100%;
  padding: 10px 10px 10px 34px;
  border: 1px solid var(--border);
  border-radius: var(--r);
}

.hidden {
  display: none;
}

.filter-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.pill {
  padding: 6px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
}

.pill.active {
  background: var(--accent);
  color: white;
}

/* LIST */
.athletes-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}

.athlete-item {
  background: white;
  padding: 12px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="header-img-wrap">
    <img class="header-img" src="gatevolley.jpg" alt="">
  </div>
</header>

<div class="container">

  <button class="back-btn" id="back-btn">← Indietro</button>

  <!-- TOGGLE FILTRI -->
  <div class="filters-toggle-wrap">
    <button class="main-filter-btn" onclick="toggleFilters()">⚙️ Filtri</button>
  </div>

  <!-- FILTRI -->
  <div class="filters-wrap" id="filters-wrap">

    <!-- SEARCH -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" placeholder="Cerca nome..." oninput="applyFilters()">
    </div>

    <!-- MORE BUTTON -->
    <button class="more-filters-btn" onclick="toggleMore()">Mostra altri filtri</button>

    <!-- ADVANCED -->
    <div id="more-filters" class="hidden">

      <div class="filter-group">
        <button class="pill active" data-group="ruolo" data-val="" onclick="setPill(this)">Tutti</button>
        <button class="pill" data-group="ruolo" data-val="Banda" onclick="setPill(this)">Banda</button>
        <button class="pill" data-group="ruolo" data-val="Opposto" onclick="setPill(this)">Opposto</button>
        <button class="pill" data-group="ruolo" data-val="Palleggiatore" onclick="setPill(this)">Palleggiatore</button>
      </div>

      <div class="filter-group">
        <button class="pill active" data-group="livello" data-val="" onclick="setPill(this)">Tutti</button>
        <button class="pill" data-group="livello" data-val="Principiante" onclick="setPill(this)">Principiante</button>
        <button class="pill" data-group="livello" data-val="Avanzato" onclick="setPill(this)">Avanzato</button>
      </div>

    </div>

  </div>

  <!-- LISTA -->
  <div class="athletes-list" id="athletes-list"></div>

</div>

<script>

let filterRuolo = "";
let filterLivello = "";

function toggleFilters() {
  const el = document.getElementById("filters-wrap");
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function toggleMore() {
  const el = document.getElementById("more-filters");
  el.classList.toggle("hidden");
}

function setPill(el) {
  const group = el.dataset.group;
  document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  if (group === "ruolo") filterRuolo = el.dataset.val;
  if (group === "livello") filterLivello = el.dataset.val;

  applyFilters();
}

function applyFilters() {
  console.log("filtri aggiornati");
}

</script>

</body>
</html>
