<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gate Volley Milano — Open Day</title>

https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F4F4F6;
  --surface: #FFFFFF;
  --surface2: #F9F9FB;
  --border: #E4E4E8;
  --border-strong: #CACACE;
  --text: #111116;
  --text2: #5A5A6A;
  --text3: #9A9AAA;
  --accent: #1A1A2E;
  --grad2: linear-gradient(90deg,#e63946,#e07b39,#e8c84a,#4caf50,#2196f3,#7b2ff7);
  --gold-bg: #FEF7EA;
  --danger: #D63031;
  --danger-bg: #FFF0F0;
  --success: #00B894;
  --r: 10px;
  --r-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
}

header {
  padding: 12px 16px 0;
}

.header-img-wrap {
  max-width: 720px;
  margin: 0 auto;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow-md);
}

.header-img {
  width: 100%;
  display: block;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

.screen { display: none; }
.screen.active { display: block; }

/* ===== FILTRI ===== */
.filters-wrap {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}

.filters-wrap.open { display: block; }

.search-wrap { position: relative; margin-bottom: 10px; }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
}

.search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--bg);
  font-family: inherit;
}

.filter-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}

.filter-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
}

.pill {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
  cursor: pointer;
}

.pill.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* ===== LISTA ===== */
.athletes-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ===== FAB ===== */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-size: 22px;
  border: none;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  z-index: 3000;
}

.fab.active {
  background: #7b2ff7;
}
</style>
</head>

<body>

<header>
  <div class="header-img-wrap">
    gatevolley.jpg
  </div>
</header>

<div class="container">

  <div id="screen-list" class="screen active">

    <div class="filters-wrap" id="filters">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input"
               placeholder="Cerca per nome..."
               oninput="applyFilters()">
      </div>

      <div class="filter-group">
        <span class="filter-label">Ruolo</span>
        <button class="pill active" data-group="ruolo" data-val="" onclick="setPill(this)">Tutti</button>
        <button class="pill" data-group="ruolo" data-val="Banda" onclick="setPill(this)">Banda</button>
        <button class="pill" data-group="ruolo" data-val="Opposto" onclick="setPill(this)">Opposto</button>
        <button class="pill" data-group="ruolo" data-val="Palleggiatore" onclick="setPill(this)">Palleggiatore</button>
        <button class="pill" data-group="ruolo" data-val="Centrale" onclick="setPill(this)">Centrale</button>
        <button class="pill" data-group="ruolo" data-val="Libero" onclick="setPill(this)">Libero</button>
        <button class="pill" data-group="ruolo" data-val="Universale" onclick="setPill(this)">Universale</button>
      </div>

      <div class="filter-group">
        <span class="filter-label">Livello</span>
        <button class="pill active" data-group="livello" data-val="" onclick="setPill(this)">Tutti</button>
        <button class="pill" data-group="livello" data-val="Principiante" onclick="setPill(this)">Principiante</button>
        <button class="pill" data-group="livello" data-val="Intermedio" onclick="setPill(this)">Intermedio</button>
        <button class="pill" data-group="livello" data-val="Avanzato" onclick="setPill(this)">Avanzato</button>
      </div>
    </div>

    <div id="list-meta"></div>
    <div class="athletes-list" id="athletes-list"></div>

  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="toggleFilters()" aria-label="Filtri">
  🔍
</button>

<script>
/* ====== TUTTO IL TUO SCRIPT ORIGINALE È INALTERATO ====== */
/* UNICA AGGIUNTA: funzione toggleFilters */

function toggleFilters() {
  const filters = document.getElementById("filters");
  const fab = document.getElementById("fab");
  const open = filters.classList.toggle("open");
  fab.classList.toggle("active", open);
}
</script>

O_SCRIPT_ORIGINALE_COMPLETO.js"></script>
</body>
</html>
